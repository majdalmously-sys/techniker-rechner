<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Techniker Rechner Pro</title>

<link rel="stylesheet" href="style.css?v=1.1">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#1565C0">

<link rel="apple-touch-icon" href="icon-192.png?v=1.1">
</head>

<body>

<div id="app">

<header class="header">

    <div class="header-top">

      <div class="brand">
    <img src="logo-header.png" alt="Techniker Rechner Pro" class="logo">
</div>

      <button id="menuButton" class="menu-btn">
    ⋮
</button>

<div id="menu" class="menu hidden">

    <button id="backupBtn">💾 Backup</button>

    <button id="restoreBtn">📁 Restore</button>

    <button id="historyBtn">📋 Verlauf</button>

    <button id="clearBtn">🗑 Alles löschen</button>

</div>

        </button>

    </div>

<div class="header-date">
    📅 <span id="today"></span>
</div>

</header>

<main class="container">

<input
id="search"
type="text"
placeholder="Tätigkeit suchen..."
>

<div id="jobList"></div>

</main>

<footer>
    <div class="totalBox">
        <span>Gesamtsumme</span>
        <strong id="totalPrice">0.00 €</strong>
    </div>

    <div class="date-box">
        <label for="workDate">📅 Arbeitsdatum</label>
        <input type="date" id="workDate">
    </div>

    <div class="buttons">
        <button id="historyButton">📊 Verlauf</button>
        <button id="clearButton">🗑️ Alles löschen</button>
        <button id="saveButton">💾 Tag speichern</button>
    </div>
    
</footer>

<!-- Verlauf -->

<div id="historyModal" class="modal hidden">

<div class="modal-content">

<h2>Gespeicherte Tage</h2>

<div id="historyList"></div>

<button id="closeHistory">

Schließen

</button>

</div>

</div>

<div id="detailsModal" class="modal hidden">

    <div class="modal-content">

        <h2>Tag Details</h2>

        <div id="detailsContent"></div>

        <button id="closeDetails">
            Schließen
        </button>

    </div>

</div>

<input
    type="file"
    id="restoreFile"
    accept=".json"
    style="display:none"
>
<script src="data.js?v=1.1"></script>
<script src="storage.js?v=1.1"></script>
<script src="app.js?v=1.1"></script>
</div>
</body>
</html>
