<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techniker Rechner Pro</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <h1>Techniker Rechner Pro</h1>
    <p id="today"></p>
</header>

<main class="container">

    <input
        id="search"
        type="text"
        placeholder="Tätigkeit suchen..."
    >

    <div id="jobList"></div>

</main>

<footer>

    <div class="totalBox">
        <span>Gesamtsumme</span>
        <strong id="totalPrice">0.00 €</strong>
    </div>

 <div class="buttons">

    <button id="historyButton">
        Verlauf
    </button>

    <button id="clearButton">
        Alles löschen
    </button>

    <button id="saveButton">
        Tag speichern
    </button>

</div>

<div id="historyModal" class="modal hidden">

    <div class="modal-content">

        <h2>Gespeicherte Tage</h2>

        <div id="historyList"></div>

        <button id="closeHistory">
            Schließen
        </button>

    </div>

</div>

</footer>

<script src="data.js"></script>
<script src="storage.js"></script>
<script src="app.js"></script>

</body>
</html>
