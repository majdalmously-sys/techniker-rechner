<!DOCTYPE html>
<html lang="de">
<head>

    <title>Techniker Rechner V2</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Techniker Rechner</h1>

    <div id="today"></div>

</header>

        type="text"
        placeholder="🔍 Tätigkeit suchen..."
    >

</main>

        <span>Gesamtsumme</span>

    <div class="buttons">

        <button id="saveButton">
            💾 Tag speichern
        </button>

    </div>

</footer>

<script src="data.js"></script>
